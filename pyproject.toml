[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "media-manager"
version = "0.6.0"
description = "Core-first media manager foundation for organizing photos and videos"
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "Manuel" }
]
license = { text = "MIT" }
keywords = ["media", "photos", "videos", "organizer", "exiftool", "cli"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: End Users/Desktop",
  "License :: OSI Approved :: MIT License",
  "Operating System :: Microsoft :: Windows",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Multimedia :: Graphics",
  "Topic :: Utilities",
]
dependencies = [
  "send2trash>=1.8",
]

[project.urls]
Homepage = "https://github.com/DevOpsOfChaos/media-manager"
Repository = "https://github.com/DevOpsOfChaos/media-manager"
Issues = "https://github.com/DevOpsOfChaos/media-manager/issues"
Changelog = "https://github.com/DevOpsOfChaos/media-manager/blob/main/CHANGELOG.md"

[project.optional-dependencies]
gui = [
  "PySide6>=6.7",
]
dev = [
  "pytest>=8.0",
]

[project.scripts]
media-manager = "media_manager.cli:main"
media-manager-gui = "media_manager.cli_gui:main"
media-manager-organize = "media_manager.cli_organize:main"
media-manager-duplicates = "media_manager.cli_duplicates:main"
media-manager-rename = "media_manager.cli_rename:main"
media-manager-qml = "media_manager.qml_app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
media_manager = [
  "qml/*.qml",
  "qml/components/*.qml",
  "qml/assets/*.svg",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
