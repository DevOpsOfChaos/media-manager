name: Bug report
description: Report a reproducible problem in the application
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue. Vague reports waste time.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the issue.
      placeholder: |
        1. Open the app
        2. Select source folder ...
        3. Click preview ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.x
  - type: input
    id: exiftool
    attributes:
      label: ExifTool version or path
      placeholder: exiftool 13.x or full path
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant logs, errors, or screenshots.
      render: shell
