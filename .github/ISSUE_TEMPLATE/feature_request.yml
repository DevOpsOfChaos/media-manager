name: Feature request
description: Suggest a focused improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Be specific. "Make it better" is not a useful feature request.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the software do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other options did you think about?
  - type: textarea
    id: scope
    attributes:
      label: Scope and trade-offs
      description: What complexity, limitations, or side effects do you expect?
